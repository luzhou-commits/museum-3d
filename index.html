<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>忠勇文化陈列馆 - 3D 数字化导览系统</title>
    <style>
        :root {
            --bg-theme: #7c565d;        /* 设计稿标志性暮色红 */
            --btn-beige: #ebdcb9;       /* 按钮古典优雅米黄色 */
            --text-dark: #2c2523;       /* 宣纸落款深色墨字 */
            --panel-paper: #ded5c5;     /* 页面3宣纸色面板 */
            --gold-title: #dfb78c;      /* 牌匾淡金色字体 */
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: "STKaiti", "Kaiti SC", "华文楷体", serif; background-color: var(--bg-theme); color: white; -webkit-user-select: none; user-select: none; }

        /* 让 Three.js 画布真正铺满全屏，防止射线拾取坐标错位 */
        #webgl-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: auto; }

        /* ================= 页面 1：主页门户 ================= */
        #homepage-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 500; display: flex; flex-direction: column;
            padding: 40px; box-sizing: border-box; gap: 30px;
            background: var(--bg-theme); transition: opacity 0.5s ease;
        }
        #homepage-container.hidden { opacity: 0; pointer-events: none; }

        .home-main-row { display: flex; flex: 1; width: 100%; gap: 30px; min-height: 0; }
        
        .cover-box {
            flex: 1.2; background: #555; border-radius: 8px; overflow: hidden;
            position: relative; box-shadow: 0 12px 35px rgba(0,0,0,0.35); cursor: pointer;
        }
        .cover-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .cover-header {
            position: absolute; top: 0; left: 0; width: 100%; height: 100px;
            background: none; /* 取消了背景色块 */
            display: flex; justify-content: space-between;
            align-items: center; padding: 0 40px; box-sizing: border-box;
        }
        .cover-title { font-size: 2.4rem; color: var(--gold-title); font-weight: bold; letter-spacing: 5px; }
        .cover-enter-hint { font-size: 1.2rem; color: var(--btn-beige); font-style: italic; letter-spacing: 1px; }

        .map-box {
            flex: 1; background: #fff; border-radius: 12px; overflow: hidden;
            box-shadow: 0 12px 35px rgba(0,0,0,0.35);
        }
        .map-box img { width: 100%; height: 100%; object-fit: cover; }

        .home-gallery-row {
            height: 190px; display: flex; gap: 24px; overflow-x: auto; padding-bottom: 8px;
            align-items: center; position: relative;
            
            /* 针对不同内核浏览器隐藏原生横向滚动条 */
            -ms-overflow-style: none;  /* IE 和 Edge */
            scrollbar-width: none;     /* Firefox 火狐 */
        }

        /* 针对 WebKit 内核（Chrome, Safari）隐藏滚动条 */
        .home-gallery-row::-webkit-scrollbar {
            display: none;
        }
        
        .gallery-item {
            flex: 0 0 280px; 
            height: 100%; 
            border: none;                  /* 完全取消白色边框 */
            border-radius: 8px;            /* 优雅的 8 像素圆角 */
            overflow: hidden;              /* 强行裁切内部图片，确保圆角完好 */
            box-shadow: 0 8px 20px rgba(0,0,0,0.35); /* 底部立体暗阴影 */
            transition: transform 0.2s ease;
        }
        .gallery-item:hover { transform: scale(1.02); }
        
        .gallery-item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            border-radius: inherit;        /* 让图片直接继承父级的圆角属性 */
        }
        
        .gallery-arrow {
            position: absolute; right: 10px; font-size: 2.5rem; color: rgba(255,255,255,0.4);
            pointer-events: none; text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* ================= 页面 2 & 3：3D 空间交互层 ================= */
        /* ⚠️ 核心修正：这里设为 pointer-events: none，防止无形的透明大框把平板手势拦截 */
        #threed-ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        
        /* 内部真正的按钮和面板重新恢复接收手势事件 */
        .left-controls {
            position: absolute; top: 45px; left: 45px; display: flex;
            flex-direction: column; gap: 20px; pointer-events: auto;
            transition: opacity 0.4s ease;
        }
        .left-controls.dimmed { opacity: 0.25; }
        
        .bottom-controls { position: absolute; bottom: 45px; left: 45px; pointer-events: auto; display: none; } 

        .classic-btn {
            background-color: var(--btn-beige); color: var(--text-dark);
            border: 1px solid rgba(0,0,0,0.15); padding: 10px 24px; border-radius: 6px;
            font-size: 1.15rem; font-weight: bold; cursor: pointer; letter-spacing: 3px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.25); transition: all 0.25s;
            touch-action: manipulation;
        }
        .classic-btn:hover { background-color: #f7ebd0; transform: translateY(-1px); box-shadow: 0 8px 18px rgba(0,0,0,0.3); }

        .right-info-panel {
            position: absolute; top: 30px; height: calc(100% - 60px); width: 450px; right: -560px; color: var(--text-dark);
            box-shadow: -10px 10px 35px rgba(0,0,0,0.25); transition: right 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: auto; display: flex; flex-direction: column; z-index: 200; cursor: default; border-radius: 12px; overflow: hidden;
            background-color: var(--panel-paper); 
            background-image: 
                linear-gradient(to bottom, rgba(124, 86, 93, 0.08), transparent 80%),
                linear-gradient(to top, rgba(44, 37, 35, 0.05), transparent 60%),
                url('img/底纹.jpg'); 
            background-repeat: repeat; background-size: 200px auto; background-position: center;     
        }
        .right-info-panel.open { right: 45px !important; }
        
        .panel-close-btn {
            position: absolute; top: 20px; left: -45px; width: 45px; height: 45px;
            background: var(--panel-paper); border-radius: 8px 0 0 8px; box-shadow: -6px 4px 12px rgba(0,0,0,0.15);
            font-size: 1.8rem; text-align: center; line-height: 41px; cursor: pointer; color: var(--text-dark); pointer-events: auto;
        }

        .panel-img-header { width: 100%; height: 320px; background: #ccc; overflow: hidden; }
        .panel-img-header img { width: 100%; height: 100%; object-fit: cover; }

        .panel-body-content { padding: 35px; flex: 1; overflow-y: auto; box-sizing: border-box; }
        .panel-main-title { font-size: 2.8rem; font-weight: bold; margin: 0 0 5px 0; letter-spacing: 6px; }
        
        .panel-divider { width: 100%; height: 2px; background: rgba(44,37,35,0.2); margin: 20px 0; }
        .panel-desc-text { font-size: 1.15rem; line-height: 2.0; text-align: justify; white-space: pre-wrap; color: #3a3230; letter-spacing: 1px; }

        .panel-body-content::-webkit-scrollbar { display: none; }
        .panel-body-content { -ms-overflow-style: none; scrollbar-width: none; }

        #cursor-tip {
            position: fixed; pointer-events: none; background: rgba(44,37,35,0.92);
            padding: 8px 16px; border-radius: 4px; font-size: 0.95rem; color: var(--btn-beige);
            display: none; z-index: 1000; border: 1px solid var(--btn-beige); box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-theme); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000; color: var(--btn-beige);
        }
        .spinner { width: 45px; height: 45px; border: 3px solid rgba(235,220,185,0.2); border-radius: 50%; border-top-color: var(--btn-beige); animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #op-tip { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 20px; font-size: 0.9rem; z-index: 99; letter-spacing: 1px; pointer-events: none;}
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="spinner"></div>
    <div style="margin-top:20px; font-size:1.1rem; letter-spacing:2px;">正在构筑数字孪生陈列馆...</div>
</div>

<canvas id="webgl-canvas"></canvas>

<div id="op-tip" class="hidden">👆 拖拽旋转视角 | 🤏 双指缩放模型 | 🔴 点选查阅标志</div>

<div id="homepage-container">
    <div class="home-main-row">
        <div class="cover-box" onclick="enterMuseum()">
            <div class="cover-header"></div>
            <img src="img/主页1 .jpg" alt="展馆封面">
        </div>

        <div class="map-box">
            <img src="img/主页2.jpg" alt="手绘地图">
        </div>
    </div>

    <div class="home-gallery-row">
        <div class="gallery-item"><img src="img/主页3.jpg"></div>
        <div class="gallery-item"><img src="img/主页4.jpg"></div>
        <div class="gallery-item"><img src="img/主页5.jpg"></div>
        <div class="gallery-item"><img src="img/主页6.jpg"></div>
        <div class="gallery-item"><img src="img/主页7.jpg"></div>
        <div class="gallery-item"><img src="img/主页8.jpg"></div>
        <div class="gallery-arrow">❯</div>
    </div>
</div>

<div id="cursor-tip"></div>

<div id="threed-ui-container">
    <div id="left-btns" class="left-controls">
        <button class="classic-btn" onclick="createDottedRoute()">游览线路</button>
        <button class="classic-btn" onclick="alert('触发：区位介绍展示')">区位介绍</button>
        <button class="classic-btn" onclick="exitToHome()">返回主页</button>
    </div>
    
    <div class="bottom-controls">
        <button class="classic-btn" onclick="createDottedRoute()">游览线路</button>
    </div>

    <div id="detail-panel" class="right-info-panel">
        <div class="panel-close-btn">➔</div>
        <div class="panel-img-header">
            <img id="panel-img" src="" alt="细节大图">
        </div>
        <div class="panel-body-content">
            <h2 id="panel-title" class="panel-main-title"></h2>
            <div class="panel-divider"></div>
            <div id="panel-desc" class="panel-desc-text"></div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
    let scene, camera, renderer, model, raycaster, mouse;
    let isInteracting = false, lastX = 0, lastY = 0;
    let pointerDownX = 0, pointerDownY = 0;
    let startTouchDistance = 0; // ⚠️ 用于精确记录移动端双指手势的初始像素距离
    const markers = []; 
    let routeMarkers = []; 

    const keysPressed = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
    const MOVE_SPEED = 0.15; 

    const LERP_FACTOR = 0.07;
    let targetLookAt = new THREE.Vector3(0, 1.5, 0);
    
    let targetDistance = 18; 
    let minDistance = 3.0;    
    let maxDistance = 50;   
    
    let targetPhi = Math.PI / 2.2; 
    let targetTheta = 0.8;

    let currentLookAt = new THREE.Vector3(0, 1.5, 0);
    let currentDistance = 35; 
    let currentPhi = Math.PI / 2;
    let currentTheta = 0.0;

    let routeLine; 

    const presetMarkersData = [
        { 
            relPos: { x: 7.24, y: 7.45, z: -0.59}, 
            type: "吞脊兽", 
            img: "img/屋脊.png", 
            desc: "一、位置说明\n在屋顶正脊两端。是垫高脊桁的正交构件。固定在屋檐最外折角处，属于重要的端头封口。\n\n二、三大实用功能\n1. 结构加固：咬住屋脊两条脊瓦，固定座脊瓦片，对接缝严密连接。\n2. 防风稳固：大风天气避免屋脊端头瓦片松动滑落。\n3. 衬护木构：减少日晒雨淋腐蚀房梁。\n\n三、民俗寓意\n防火镇宅：传说螭吻是龙生九子之一，喜吞水、能吞火，古人常托其守护祈求防火。"
        },
        { 
            relPos: {x: 1.06, y: 6.85, z: -0.58 }, 
            type: "瓦当滴水", 
            img: "img/瓦当.jpg",
            desc: "瓦当位于合瓦形成的瓦垄的底端，铺在房檐边上的滴水瓦的瓦头，呈圆形或半圆形。瓦当上常常会有各种图案，如文字、动物纹、植物纹等。有些瓦当没有任何装饰，称为素面瓦当。\n与瓦当对应下端呈下垂的圆尖形状的为滴水，位于屋顶仰瓦形成的瓦沟最下面，垂吊在屋檐底下，方便引导雨水流下，保护墙壁的洁净，与瓦当功能互相补充。瓦当与滴水相辅相成，共同构成了古建筑屋檐上的重要装饰和防水系统。"
        },
        { 
            relPos: { x: -7.90, y: 4.85, z: 0.13 }, 
            type: "飞檐", 
            img: "img/飞檐.jpg",
            desc: "中国古代建筑在檐部上的一种特殊处理和创造。通过檐部的这种特殊处理和创造，扩大了采光面、有利于排泄雨水，而且增添了建筑物向向上的动感。\n飞檐在不同地区呈现出不同的韵味，在北方地区，飞檐通常会雕刻各种灵兽、祥云、鲤鱼等图案，用来驱邪祈福。而在南方地区，飞檐则多用燕尾飞檐，注重突出建筑的灵动之感。建筑群中层叠的飞檐翘角更是营造出壮观的气势和中国古建筑特有的轻快韵味。"
        }
    ];

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x7c565d); 
        scene.fog = new THREE.FogExp2(0x7c565d, 0.012);

        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const canvasElement = document.getElementById('webgl-canvas');
        renderer = new THREE.WebGLRenderer({ canvas: canvasElement, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;

        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();

        const hemiLight = new THREE.HemisphereLight(0xfff3e0, 0x5d4037, 0.95);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xfff8e1, 0.75);
        dirLight.position.set(30, 40, 20);
        scene.add(dirLight);

        loadYourOwnModel('6777.glb');

        // ⚠️ 鼠标与多端触控手势统一绑定
        window.addEventListener('mousemove', onPointerMove);
        window.addEventListener('touchmove', onPointerMove, { passive: false });

        window.addEventListener('mousedown', onPointerDown);
        window.addEventListener('touchstart', onPointerDown, { passive: false });

        window.addEventListener('mouseup', onPointerUp);
        window.addEventListener('touchend', onPointerUp, { passive: false });

        window.addEventListener('wheel', onWindowWheel, { passive: false }); 
        window.addEventListener('resize', onResize);

        window.addEventListener('keydown', (e) => { if(e.key in keysPressed) keysPressed[e.key] = true; });
        window.addEventListener('keyup', (e) => { if(e.key in keysPressed) keysPressed[e.key] = false; });

        // 屏蔽细节面板内部的手势冒泡，防止滑动或点击面板时触发背景视角的转动
        const detailPanel = document.getElementById('detail-panel');
        detailPanel.addEventListener('click', function(e) { e.stopPropagation(); closeDetailPanel(); });
        detailPanel.addEventListener('pointerdown', (e) => e.stopPropagation());
        detailPanel.addEventListener('touchstart', (e) => e.stopPropagation());
        detailPanel.addEventListener('wheel', (e) => e.stopPropagation());
        detailPanel.addEventListener('mousemove', (e) => e.stopPropagation());
        detailPanel.addEventListener('touchmove', (e) => e.stopPropagation());
        
        animate(0);
    }

    function loadYourOwnModel(url) {
        document.getElementById('loading-screen').style.display = 'flex';
        const loader = new THREE.GLTFLoader();
        loader.load(url, function (gltf) {
            model = gltf.scene;
            scene.add(model);

            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            model.position.sub(center); 
            
            const maxDim = Math.max(size.x, size.y, size.z);
            targetDistance = maxDim * 1.6;
            minDistance = maxDim * 0.4;
            maxDistance = maxDim * 4.5;

            presetMarkersData.forEach(data => { createFadingMarker(data); });
            document.getElementById('loading-screen').style.display = 'none';
        }, undefined, function (error) {
            console.error(error);
            document.getElementById('loading-screen').style.display = 'none';
        });
    }

    function createFadingMarker(data) {
        const markerGroup = new THREE.Group();
        markerGroup.position.set(data.relPos.x, data.relPos.y, data.relPos.z);

        const geoHit = new THREE.SphereGeometry(0.35, 32, 32);
        const matHit = new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.12, blending: THREE.AdditiveBlending });
        const meshHit = new THREE.Mesh(geoHit, matHit);
        meshHit.userData = { isHitContainer: true, title: data.type, imgUrl: data.img, desc: data.desc };
        markerGroup.add(meshHit);

        const geoCore = new THREE.SphereGeometry(0.14, 16, 16);
        const matCore = new THREE.MeshBasicMaterial({ color: 0xdfb78c, transparent: true, opacity: 0.9 }); 
        const meshCore = new THREE.Mesh(geoCore, matCore);
        markerGroup.add(meshCore);

        const geoPulse = new THREE.RingGeometry(0.15, 0.18, 32);
        const matPulse = new THREE.MeshBasicMaterial({ color: 0xdfb78c, transparent: true, side: THREE.DoubleSide });
        const meshPulse = new THREE.Mesh(geoPulse, matPulse);
        markerGroup.add(meshPulse);

        model.add(markerGroup);
        markers.push(markerGroup);
    }

    function createDottedRoute() {
        if(routeLine && model) model.remove(routeLine);
        routeMarkers.forEach(marker => { if(model) model.remove(marker); });
        routeMarkers = [];

        const points = [
            new THREE.Vector3(-0.01, 1.63, 4.29),
            new THREE.Vector3(0.11, 1.63, -1.14),
            new THREE.Vector3(7.12, 1.63, -1.39) 
        ];
        const curve = new THREE.CatmullRomCurve3(points);
        
        const pathSegments = 64;   
        const tubeRadius = 0.05;   
        const radiusSegments = 8;  
        const closed = false;      
        
        const geometry = new THREE.TubeGeometry(curve, pathSegments, tubeRadius, radiusSegments, closed);

        const material = new THREE.MeshBasicMaterial({
            color: 0xdfb78c,
            transparent: true,
            opacity: 0.75,
            wireframe: false
        });

        routeLine = new THREE.Mesh(geometry, material); 
        
        if (model) { model.add(routeLine); } else { scene.add(routeLine); }

        points.forEach((pt, index) => {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            ctx.beginPath();
            ctx.arc(32, 32, 26, 0, Math.PI * 2);
            ctx.fillStyle = '#7c565d'; 
            ctx.fill();
            
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#dfb78c'; 
            ctx.stroke();
            
            ctx.fillStyle = '#ebdcb9'; 
            ctx.font = 'bold 32px STKaiti, serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(index + 1, 32, 34);

            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(spriteMat);
            
            sprite.position.copy(pt).add(new THREE.Vector3(0, 0.28, 0));
            sprite.scale.set(0.65, 0.65, 1); 

            if(model) {
                model.add(sprite);
                routeMarkers.push(sprite);
            }
        });
    }

    function handleKeyboardMovement() {
        if (!document.getElementById('homepage-container').classList.contains('hidden')) return;

        const forward = new THREE.Vector3(Math.cos(currentTheta), 0, Math.sin(currentTheta)).normalize();
        const right = new THREE.Vector3(-Math.sin(currentTheta), 0, Math.cos(currentTheta)).normalize();

        if (keysPressed.w || keysPressed.ArrowUp) targetLookAt.addScaledVector(forward, -MOVE_SPEED);
        if (keysPressed.s || keysPressed.ArrowDown) targetLookAt.addScaledVector(forward, MOVE_SPEED);
        if (keysPressed.a || keysPressed.ArrowLeft) targetLookAt.addScaledVector(right, -MOVE_SPEED);
        if (keysPressed.d || keysPressed.ArrowRight) targetLookAt.addScaledVector(right, MOVE_SPEED);
    }

    function onWindowWheel(e) {
        if (document.getElementById('homepage-container').classList.contains('hidden')) return;
        e.preventDefault(); 
        const scaleAmount = targetDistance * 0.08;
        if (e.deltaY < 0) {
            targetDistance -= scaleAmount; 
        } else {
            targetDistance += scaleAmount; 
        }
        targetDistance = Math.max(minDistance, Math.min(maxDistance, targetDistance));
    }

    function enterMuseum() {
        document.getElementById('homepage-container').classList.add('hidden');
        document.getElementById('op-tip').classList.remove('hidden'); 
        if(model) {
            const box = new THREE.Box3().setFromObject(model);
            targetDistance = Math.max(box.getSize(new THREE.Vector3()).x * 1.5, 14);
        }
        targetTheta = 1.0;
    }

    function exitToHome() {
        closeDetailPanel();
        if(routeLine && model) model.remove(routeLine); 
        routeMarkers.forEach(marker => { if(model) model.remove(marker); });
        routeMarkers = [];
        document.getElementById('homepage-container').classList.remove('hidden');
        document.getElementById('op-tip').classList.add('hidden'); 
        targetDistance = 35;
    }

    function openDetailPanel(markerData, intersectPoint) {
        document.getElementById('panel-title').innerText = markerData.title;
        document.getElementById('panel-desc').innerText = markerData.desc;
        document.getElementById('panel-img').src = markerData.imgUrl;
        document.getElementById('detail-panel').classList.add('open');
        document.getElementById('left-btns').classList.add('dimmed');

        const hitWorldPos = intersectPoint.clone();
        const rightVec = new THREE.Vector3(-Math.sin(currentTheta), 0, Math.cos(currentTheta)).normalize();
        
        const offsetDistance = 1.6; 
        hitWorldPos.addScaledVector(rightVec, offsetDistance);

        targetLookAt.copy(hitWorldPos);
        targetDistance = minDistance * 1.6; 
    }

    function closeDetailPanel() {
        document.getElementById('detail-panel').classList.remove('open');
        document.getElementById('left-btns').classList.remove('dimmed');
        targetLookAt.set(0, 1.5, 0); 
        if(model) {
            const box = new THREE.Box3().setFromObject(model);
            targetDistance = Math.max(box.getSize(new THREE.Vector3()).x * 1.6, 12);
        }
    }

    // 统一获取当前坐标的底层工具函数（完美平滑鼠标和多点触控）
    function updateMouseCoords(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        let clientX, clientY;
        
        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        
        mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
        return { clientX, clientY };
    }

    function onPointerDown(e) {
        if (e.target.tagName !== 'CANVAS') return;
        
        isInteracting = true;
        
        // ⚠️ 核心修复一：当检测到平板屏幕有多于两个触控点时，立刻优先记录双指初始空间像素宽度
        if (e.touches && e.touches.length >= 2) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            startTouchDistance = Math.sqrt(dx * dx + dy * dy);
            return; // 提前退出，切断单指旋转逻辑的干扰
        }
        
        // 正常单指或电脑鼠标点击
        const coords = updateMouseCoords(e);
        lastX = coords.clientX; 
        lastY = coords.clientY;
        pointerDownX = coords.clientX; 
        pointerDownY = coords.clientY;
    }

    function onPointerMove(e) {
        // 当进入 3D 展馆后，在 Canvas 区域上强制阻止平板自带的“网页下拉刷新/滑出黑底”默认手势行为
        if (document.getElementById('homepage-container').classList.contains('hidden') && e.target.tagName === 'CANVAS') {
            if(e.cancelable) e.preventDefault(); 
        }
        
        const coords = updateMouseCoords(e);

        // ⚠️ 核心修复二：多点触控（双指缩放）高阶比例映射计算
        if (isInteracting && e.touches && e.touches.length >= 2) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            const touchDistance = Math.sqrt(dx * dx + dy * dy);
            
            if (startTouchDistance > 0) {
                const factor = touchDistance / startTouchDistance;
                
                // 将拉伸比例直接作用于相机目标距离，完美还原原生手感
                targetDistance = targetDistance / factor;
                targetDistance = Math.max(minDistance, Math.min(maxDistance, targetDistance));
                
                // 实时动态更新基准值，保证缩放体验丝滑连续，不卡顿、不突变
                startTouchDistance = touchDistance; 
            }
            return; // 缩放中不再响应单指拖拽视野旋转
        }

        // 单指或电脑鼠标拖拽：旋转视角逻辑
        if (isInteracting && (!e.touches || e.touches.length === 1)) {
            targetTheta += (coords.clientX - lastX) * 0.007; 
            targetPhi -= (coords.clientY - lastY) * 0.007;
            targetPhi = Math.max(0.1, Math.min(Math.PI / 2 - 0.02, targetPhi));
            lastX = coords.clientX; 
            lastY = coords.clientY;
        }

        // 桌面端鼠标射线悬停特效气泡（平板触控无需此行为）
        if (e.type === 'mousemove') {
            raycaster.setFromCamera(mouse, camera);
            const checkHitTargets = [];
            markers.forEach(group => {
                const container = group.children[0]; 
                if(container.userData.isHitContainer) checkHitTargets.push(container);
            });

            const intersects = raycaster.intersectObjects(checkHitTargets, true);
            const tip = document.getElementById('cursor-tip');
            if (intersects.length > 0) {
                tip.style.display = 'block';
                tip.style.left = (coords.clientX + 15) + 'px';
                tip.style.top = (coords.clientY + 15) + 'px';
                tip.innerHTML = `🏮 点选查阅：${intersects[0].object.userData.title}`;
                document.body.style.cursor = 'pointer';
            } else {
                tip.style.display = 'none';
                document.body.style.cursor = 'default';
            }
        }
    }

    function onPointerUp(e) {
        if (!isInteracting) return;
        isInteracting = false;
        startTouchDistance = 0; // 手指离开时清空缩放标记位

        if (e.target.tagName !== 'CANVAS') return;
        
        let endX = (e.changedTouches && e.changedTouches.length > 0) ? e.changedTouches[0].clientX : e.clientX;
        let endY = (e.changedTouches && e.changedTouches.length > 0) ? e.changedTouches[0].clientY : e.clientY;

        // 如果手指或鼠标在屏幕上滑动的物理距离过长，判定用户是在“旋转视野”，直接拒绝触发热点标签弹出层
        if (Math.abs(endX - pointerDownX) > 10 || Math.abs(endY - pointerDownY) > 10) return;

        raycaster.setFromCamera(mouse, camera);
        const checkHitTargets = [];
        markers.forEach(group => {
            const container = group.children[0]; 
            if(container.userData.isHitContainer) checkHitTargets.push(container);
        });

        const intersects = raycaster.intersectObjects(checkHitTargets, true);
        if (intersects.length > 0) {
            const hitMesh = intersects[0].object;
            const intersectPoint = intersects[0].point; 
            openDetailPanel(hitMesh.userData, intersectPoint); 
        }
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate(time) {
        requestAnimationFrame(animate);

        handleKeyboardMovement();

        currentLookAt.lerp(targetLookAt, LERP_FACTOR);
        currentDistance += (targetDistance - currentDistance) * LERP_FACTOR;
        currentPhi += (targetPhi - currentPhi) * LERP_FACTOR;
        currentTheta += (targetTheta - currentTheta) * LERP_FACTOR;

        const x = currentDistance * Math.sin(currentPhi) * Math.cos(currentTheta);
        const y = currentDistance * Math.cos(currentPhi);
        const z = currentDistance * Math.sin(currentPhi) * Math.sin(currentTheta);

        camera.position.set(x + currentLookAt.x, y + currentLookAt.y, z + currentLookAt.z);
        camera.lookAt(currentLookAt);

        if(model) {
            markers.forEach((group, idx) => {
                group.lookAt(camera.position); 
                const scalePulse = 1 + Math.sin(time * 0.005 + idx * 0.8) * 0.12;
                group.children[1].scale.set(scalePulse, scalePulse, scalePulse); 

                const pulseCircle = group.children[2]; 
                const pulseCycle = (time * 0.004) % 1; 
                pulseCircle.scale.set(1 + pulseCycle * 1.6, 1 + pulseCycle * 1.6, 1);
                pulseCircle.material.opacity = Math.max(0, 1 - pulseCycle * 1.4); 
            });
        }

        if (routeLine && routeLine.material) {
            routeLine.material.opacity = 0.65 + Math.sin(time * 0.0035) * 0.22; 
        }

        renderer.render(scene, camera);
    }

    window.onload = init;
</script>
</body>
</html>
