<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>数字化导览系统</title>
    <style>
        :root {
            --bg-theme: #7c565d;        
            --btn-beige: #ebdcb9;       
            --text-dark: #2c2523;       
            --panel-paper: #ded5c5;     
            --gold-title: #dfb78c;      
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: "STKaiti", "Kaiti SC", "华文楷体", serif; background-color: var(--bg-theme); color: white; -webkit-user-select: none; user-select: none; }

        #webgl-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: auto; }

        /* ================= 页面 1：主页门户 ================= */
        #homepage-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 500; display: flex; flex-direction: column;
            padding: 40px; box-sizing: border-box; gap: 30px;
            background: var(--bg-theme); transition: opacity 0.5s ease;
            overflow-y: auto; 
        }
        #homepage-container.hidden { opacity: 0; pointer-events: none; }

        .home-main-row { display: flex; flex: 1; width: 100%; gap: 30px; min-height: 0; }
        
        .cover-box {
            flex: 1.2; background: #555; border-radius: 8px; overflow: hidden;
            position: relative; box-shadow: 0 12px 35px rgba(0,0,0,0.35); cursor: pointer;
        }
        .cover-box img { width: 100%; height: 100%; object-fit: cover; }

        .map-box { flex: 1; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 12px 35px rgba(0,0,0,0.35); }
        .map-box img { width: 100%; height: 100%; object-fit: cover; }

        .home-gallery-row {
            height: 190px; display: flex; gap: 24px; overflow-x: auto; padding-bottom: 8px;
            align-items: center; position: relative; -ms-overflow-style: none; scrollbar-width: none;
        }
        .home-gallery-row::-webkit-scrollbar { display: none; }
        
        .gallery-item { flex: 0 0 280px; height: 100%; border: none; border-radius: 8px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.35); transition: transform 0.2s ease; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; border-radius: inherit; }
        .gallery-arrow { position: absolute; right: 10px; font-size: 2.5rem; color: rgba(255,255,255,0.4); pointer-events: none; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        /* ================= 页面 2 & 3：3D 空间UI交互层 ================= */
        #threed-ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        
        .left-controls { position: absolute; top: 30px; left: 30px; display: flex; flex-direction: column; gap: 15px; pointer-events: auto; transition: opacity 0.4s ease; }
        .left-controls.dimmed { opacity: 0.15; }

        .classic-btn {
            background-color: var(--btn-beige); color: var(--text-dark);
            border: 1px solid rgba(0,0,0,0.15); padding: 10px 20px; border-radius: 6px;
            font-size: 1.05rem; font-weight: bold; cursor: pointer; letter-spacing: 2px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.25); transition: all 0.25s; touch-action: manipulation;
        }

        .right-info-panel {
            position: absolute; top: 30px; height: calc(100% - 60px); width: 450px; right: -560px; color: var(--text-dark);
            box-shadow: -10px 10px 35px rgba(0,0,0,0.25); transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: auto; display: flex; flex-direction: column; z-index: 200; border-radius: 12px; overflow: hidden;
            background-color: var(--panel-paper); 
        }
        .right-info-panel.open { right: 30px !important; }
        
        .panel-close-btn { 
            position: absolute; top: 20px; left: -45px; width: 45px; height: 45px; 
            background: var(--panel-paper); border-radius: 8px 0 0 8px; 
            box-shadow: -6px 4px 12px rgba(0,0,0,0.15); font-size: 1.8rem; 
            text-align: center; line-height: 41px; cursor: pointer; color: var(--text-dark); 
            z-index: 210; pointer-events: auto;
        }

        .panel-img-header { width: 100%; height: 300px; overflow: hidden; background: #ccc; }
        .panel-img-header img { width: 100%; height: 100%; object-fit: cover; }
        .panel-body-content { padding: 30px; flex: 1; overflow-y: auto; box-sizing: border-box; -ms-overflow-style: none; scrollbar-width: none; }
        .panel-body-content::-webkit-scrollbar { display: none; }
        .panel-main-title { font-size: 2.2rem; font-weight: bold; margin: 0 0 5px 0; letter-spacing: 4px; }
        .panel-divider { width: 100%; height: 2px; background: rgba(44,37,35,0.2); margin: 15px 0; }
        .panel-desc-text { font-size: 1.1rem; line-height: 1.8; text-align: justify; white-space: pre-wrap; color: #3a3230; }

        #cursor-tip { position: fixed; pointer-events: none; background: rgba(44,37,35,0.92); padding: 8px 16px; border-radius: 4px; font-size: 0.95rem; color: var(--btn-beige); display: none; z-index: 1000; border: 1px solid var(--btn-beige); }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-theme); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; color: var(--btn-beige); }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(235,220,185,0.2); border-radius: 50%; border-top-color: var(--btn-beige); animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #op-tip { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; z-index: 99; letter-spacing: 1px; pointer-events: none; text-align: center; white-space: nowrap;}
        .hidden { display: none !important; }

/* ... 上面是你原本的各种样式 ... */
        #op-tip { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; z-index: 99; letter-spacing: 1px; pointer-events: none; text-align: center; white-space: nowrap;}
        .hidden { display: none !important; }

        /* 💡 ================= 在这里插入新样式 ================= */
        .cover-box.full-width-cover {
            flex: 1;
            width: 100%;
            height: 100%;
            background: #555; 
            border-radius: 12px;
            overflow: hidden;
            position: relative; 
            box-shadow: 0 12px 35px rgba(0,0,0,0.35); 
            cursor: pointer;
        }
        .cover-box.full-width-cover img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        .enter-tip-text {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--btn-beige);    
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 3px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.85); 
            background: rgba(44, 37, 35, 0.55); 
            padding: 8px 24px;
            border-radius: 20px;
            border: 1px solid rgba(235, 220, 185, 0.3);
            pointer-events: none;
            white-space: nowrap;
            animation: hintPulse 2s infinite ease-in-out;
        }
        @keyframes hintPulse {
            0%, 100% { opacity: 0.85; transform: translate(-50%, 0); }
            50% { opacity: 1; transform: translate(-50%, -3px); }
        }
        /* 💡 ================= 新样式结束 ================= */

        /* 紧接着就是原有的手机端适配响应式代码 */
        @media screen and (max-width: 768px) {
            #homepage-container { padding: 16px; gap: 16px; overflow-y: auto; }
            ...

        @media screen and (max-width: 768px) {
            #homepage-container { padding: 16px; gap: 16px; overflow-y: auto; }
            .home-main-row { flex-direction: column; height: auto; flex: none; gap: 16px; }
            .cover-box { height: 220px; flex: none; }
            .map-box { height: 200px; flex: none; }
            .home-gallery-row { height: 140px; gap: 12px; flex: none; margin-top: 5px; }
            .gallery-item { flex: 0 0 180px; }
            .gallery-arrow { display: none; } 

            .left-controls { top: 16px; left: 16px; gap: 10px; width: calc(100% - 32px); flex-direction: row; flex-wrap: wrap; }
            .classic-btn { padding: 8px 14px; font-size: 0.9rem; letter-spacing: 1px; flex: 1; text-align: center; white-space: nowrap; }

            .right-info-panel {
                width: 100% !important; height: 75% !important; 
                bottom: -80% !important; top: auto !important; 
                left: 0 !important; right: 0 !important;
                border-radius: 16px 16px 0 0; 
                box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
                transition: bottom 0.4s ease-out !important;
            }
            .right-info-panel.open { bottom: 0 !important; right: 0 !important; }
            .panel-close-btn {
                left: auto !important; right: 16px !important; top: 16px !important;
                border-radius: 50% !important; width: 36px !important; height: 36px !important;
                line-height: 34px !important; background: rgba(0,0,0,0.6) !important;
                color: #fff !important; font-size: 1.2rem !important;
                box-shadow: 0 2px 8px rgba(0,0,0,0.2) !important; z-index: 250;
            }

            .panel-img-header { height: 200px; }
            .panel-body-content { padding: 20px; }
            .panel-main-title { font-size: 1.8rem; }
            .panel-desc-text { font-size: 1rem; line-height: 1.6; }
            #op-tip { font-size: 0.75rem; width: 85%; bottom: 15px; }
        }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="spinner"></div>
    <div style="margin-top:20px; font-size:1rem; letter-spacing:2px;">正在加载数字孪生陈列馆...</div>
</div>

<canvas id="webgl-canvas"></canvas>

<div id="op-tip" class="hidden">拖拽旋转 | 双指缩放 | 点击热点查阅</div>

<div id="homepage-container">
   <div class="home-main-row">
    <div class="cover-box full-width-cover" onclick="enterMuseum()">
        <img src="img/主页1 .jpg" alt="数字化导览陈列馆">
        
        <div class="enter-tip-text">点击进入三维导航</div>
    </div>
</div>

    <div class="home-gallery-row">
        <div class="gallery-item"><img src="img/主页3.jpg"></div>
        <div class="gallery-item"><img src="img/主页4.jpg"></div>
        <div class="gallery-item"><img src="img/主页5.jpg"></div>
        <div class="gallery-item"><img src="img/主页6.jpg"></div>
        <div class="gallery-item"><img src="img/主页7.jpg"></div>
        <div class="gallery-item"><img src="img/主页8.jpg"></div>
        <div class="gallery-arrow">❯</div>
    </div>
</div>

<div id="cursor-tip"></div>

<div id="threed-ui-container">
    <div id="left-btns" class="left-controls">
        <button class="classic-btn" onclick="createDottedRoute()">游览线路</button>
        <button class="classic-btn" onclick="alert('区位介绍暂未开放')">区位介绍</button>
        <button class="classic-btn" onclick="exitToHome()">返回主页</button>
    </div>
    
    <div id="detail-panel" class="right-info-panel">
        <div id="close-panel-btn" class="panel-close-btn">✕</div>
        <div class="panel-img-header">
            <img id="panel-img" src="" alt="细节大图">
        </div>
        <div class="panel-body-content">
            <h2 id="panel-title" class="panel-main-title"></h2>
            <div class="panel-divider"></div>
            <div id="panel-desc" class="panel-desc-text"></div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>

<script>
    let scene, camera, renderer, model, raycaster, mouse;
    let isInteracting = false, lastX = 0, lastY = 0;
    let pointerDownX = 0, pointerDownY = 0;
    let startTouchDistance = 0; 
    const markers = []; 
    let routeMarkers = []; 

    const LERP_FACTOR = 0.08;
    let targetLookAt = new THREE.Vector3(0, 1.5, 0);
    let targetDistance = 18; 
    let minDistance = 3.0;    
    let maxDistance = 50;   
    let targetPhi = Math.PI / 2.3; 
    let targetTheta = 0.8;

    let currentLookAt = new THREE.Vector3(0, 1.5, 0);
    let currentDistance = 35; 
    let currentPhi = Math.PI / 2;
    let currentTheta = 0.0;
    let routeLine; 

    const presetMarkersData = [
        { 
            relPos: { x: 7.24, y: 7.45, z: -0.59}, 
            type: "吞脊兽", 
            img: "img/屋脊.png", 
            desc: "一、位置说明\n在屋顶正脊两端。是垫高脊桁的正交构件。固定在屋檐最外折角处，属于重要的端头封口。\n\n二、三大实用功能\n1. 结构加固：固定座脊瓦片，对接缝严密连接。\n2. 防风稳固：大风天气避免屋脊端头瓦片松动滑落。\n3. 衬护木构：减少日晒雨淋腐蚀房梁。"
        },
        { 
            relPos: {x: 1.06, y: 6.85, z: -0.58 }, 
            type: "瓦当滴水", 
            img: "img/瓦当.jpg",
            desc: "瓦当位于合瓦形成的瓦垄的底端，铺在房檐边上的滴水瓦的瓦头。与瓦当对应下端呈下垂的圆尖形状的为滴水，位于屋顶仰瓦形成的瓦沟最下面，垂吊在屋檐底下，方便引导雨水流下，保护墙壁的洁净。"
        },
        { 
            relPos: { x: -7.90, y: 4.85, z: 0.13 }, 
            type: "飞檐", 
            img: "img/飞檐.jpg",
            desc: "中国古代建筑在檐部上的一种特殊处理和创造。通过檐部的这种特殊处理和创造，扩大了采光面、有利于排泄雨水，而且增添了建筑物向向上的动感。"
        }
    ];

    function init() {
        // 安全检测：确保库已成功挂载
        if (typeof THREE === 'undefined' || !THREE.GLTFLoader || !THREE.DRACOLoader) {
            console.error("Three.js 核心库或解码器未准备就绪，延迟初始化");
            setTimeout(init, 300);
            return;
        }

        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x7c565d); 
        scene.fog = new THREE.FogExp2(0x7c565d, 0.012);

        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const canvasElement = document.getElementById('webgl-canvas');
        renderer = new THREE.WebGLRenderer({ canvas: canvasElement, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;

        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();

        const hemiLight = new THREE.HemisphereLight(0xfff3e0, 0x5d4037, 0.95);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xfff8e1, 0.75);
        dirLight.position.set(30, 40, 20);
        scene.add(dirLight);

        loadYourOwnModel('6777.glb');

        // 多端手势通用适配
        window.addEventListener('mousemove', onPointerMove);
        window.addEventListener('touchmove', onPointerMove, { passive: false });
        window.addEventListener('mousedown', onPointerDown);
        window.addEventListener('touchstart', onPointerDown, { passive: false });
        window.addEventListener('mouseup', onPointerUp);
        window.addEventListener('touchend', onPointerUp, { passive: false });
        window.addEventListener('wheel', onWindowWheel, { passive: false }); 
        window.addEventListener('resize', onResize);

        const closeBtn = document.getElementById('close-panel-btn');
        const handleClose = function(e) {
            e.preventDefault(); e.stopPropagation();
            closeDetailPanel();
        };
        closeBtn.addEventListener('pointerdown', handleClose);
        closeBtn.addEventListener('touchstart', handleClose);

        const detailPanel = document.getElementById('detail-panel');
        detailPanel.addEventListener('pointerdown', (e) => { if(e.target !== closeBtn) e.stopPropagation(); });
        detailPanel.addEventListener('touchstart', (e) => { if(e.target !== closeBtn) e.stopPropagation(); });
        detailPanel.addEventListener('wheel', (e) => e.stopPropagation());
        
        animate(0);
    }

    function loadYourOwnModel(url) {
        document.getElementById('loading-screen').style.display = 'flex';
        const loader = new THREE.GLTFLoader();
        
        const dracoLoader = new THREE.DRACOLoader();
        // 🛠️ 关键修复：更换为国内及手机端访问更平滑的 CDN 解码器路径
        dracoLoader.setDecoderPath('./draco/');
        loader.setDRACOLoader(dracoLoader);

        loader.load(url, function (gltf) {
            model = gltf.scene;
            scene.add(model);

            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            model.position.sub(center); 
            
            const maxDim = Math.max(size.x, size.y, size.z);
            targetDistance = maxDim * 1.6;
            minDistance = maxDim * 0.35;
            maxDistance = maxDim * 4.5;

            if(window.innerWidth < 768) { targetDistance = maxDim * 2.0; }

            presetMarkersData.forEach(data => { createFadingMarker(data); });
            document.getElementById('loading-screen').style.display = 'none';
            dracoLoader.dispose();
        }, undefined, function (error) {
            console.error('手机端解析模型流异常:', error);
            document.getElementById('loading-screen').style.display = 'none';
        });
    }

    function createFadingMarker(data) {
        const markerGroup = new THREE.Group();
        markerGroup.position.set(data.relPos.x, data.relPos.y, data.relPos.z);

        const geoHit = new THREE.SphereGeometry(0.4, 32, 32);
        const matHit = new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.0, blending: THREE.AdditiveBlending });
        const meshHit = new THREE.Mesh(geoHit, matHit);
        meshHit.userData = { isHitContainer: true, title: data.type, imgUrl: data.img, desc: data.desc };
        markerGroup.add(meshHit);

        const geoCore = new THREE.SphereGeometry(0.15, 16, 16);
        const matCore = new THREE.MeshBasicMaterial({ color: 0xdfb78c }); 
        const meshCore = new THREE.Mesh(geoCore, matCore);
        markerGroup.add(meshCore);

        const geoPulse = new THREE.RingGeometry(0.16, 0.22, 32);
        const matPulse = new THREE.MeshBasicMaterial({ color: 0xdfb78c, transparent: true, side: THREE.DoubleSide });
        const meshPulse = new THREE.Mesh(geoPulse, matPulse);
        markerGroup.add(meshPulse);

        model.add(markerGroup);
        markers.push(markerGroup);
    }

    function createDottedRoute() {
        if(routeLine && model) model.remove(routeLine);
        routeMarkers.forEach(marker => { if(model) model.remove(marker); });
        routeMarkers = [];

        const points = [
            new THREE.Vector3(-0.01, 1.63, 4.29),
            new THREE.Vector3(0.11, 1.63, -1.14),
            new THREE.Vector3(7.12, 1.63, -1.39) 
        ];
        const curve = new THREE.CatmullRomCurve3(points);
        const geometry = new THREE.TubeGeometry(curve, 64, 0.05, 8, false);
        const material = new THREE.MeshBasicMaterial({ color: 0xdfb78c, transparent: true, opacity: 0.75 });
        routeLine = new THREE.Mesh(geometry, material); 
        
        if (model) model.add(routeLine);

        points.forEach((pt, index) => {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.beginPath(); ctx.arc(32, 32, 26, 0, Math.PI * 2);
            ctx.fillStyle = '#7c565d'; ctx.fill();
            ctx.lineWidth = 3; ctx.strokeStyle = '#dfb78c'; ctx.stroke();
            ctx.fillStyle = '#ebdcb9'; ctx.font = 'bold 32px serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(index + 1, 32, 34);

            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.position.copy(pt).add(new THREE.Vector3(0, 0.3, 0));
            sprite.scale.set(0.6, 0.6, 1); 
            if(model) { model.add(sprite); routeMarkers.push(sprite); }
        });
    }

    function onWindowWheel(e) {
        if (!document.getElementById('homepage-container').classList.contains('hidden')) return;
        e.preventDefault(); 
        const scaleAmount = targetDistance * 0.08;
        targetDistance += (e.deltaY < 0) ? -scaleAmount : scaleAmount;
        targetDistance = Math.max(minDistance, Math.min(maxDistance, targetDistance));
    }

    function enterMuseum() {
        document.getElementById('homepage-container').classList.add('hidden');
        document.getElementById('op-tip').classList.remove('hidden'); 
        if(model) {
            const box = new THREE.Box3().setFromObject(model);
            targetDistance = Math.max(box.getSize(new THREE.Vector3()).x * (window.innerWidth < 768 ? 2.0 : 1.5), 14);
        }
        targetTheta = 1.0;
    }

    function exitToHome() {
        closeDetailPanel();
        if(routeLine && model) model.remove(routeLine); 
        routeMarkers.forEach(marker => { if(model) model.remove(marker); });
        routeMarkers = [];
        document.getElementById('homepage-container').classList.remove('hidden');
        document.getElementById('op-tip').classList.add('hidden'); 
    }

    function openDetailPanel(markerData, intersectPoint) {
        document.getElementById('panel-title').innerText = markerData.title;
        document.getElementById('panel-desc').innerText = markerData.desc;
        document.getElementById('panel-img').src = markerData.imgUrl;
        
        if(window.innerWidth < 768) {
            document.getElementById('close-panel-btn').innerText = '✕';
        } else {
            document.getElementById('close-panel-btn').innerText = '➔';
        }

        document.getElementById('detail-panel').classList.add('open');
        document.getElementById('left-btns').classList.add('dimmed');

        if(window.innerWidth > 768) {
            const hitWorldPos = intersectPoint.clone();
            const rightVec = new THREE.Vector3(-Math.sin(currentTheta), 0, Math.cos(currentTheta)).normalize();
            hitWorldPos.addScaledVector(rightVec, 1.5);
            targetLookAt.copy(hitWorldPos);
            targetDistance = minDistance * 1.5; 
        }
    }

    function closeDetailPanel() {
        document.getElementById('detail-panel').classList.remove('open');
        document.getElementById('left-btns').classList.remove('dimmed');
        if(window.innerWidth > 768) {
            targetLookAt.set(0, 1.5, 0); 
        }
    }

    function updateMouseCoords(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        let clientX, clientY;
        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX; clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX; clientY = e.clientY;
        }
        mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
        return { clientX, clientY };
    }

    function onPointerDown(e) {
        if (e.target.tagName !== 'CANVAS') return;
        isInteracting = true;
        
        if (e.touches && e.touches.length >= 2) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            startTouchDistance = Math.sqrt(dx * dx + dy * dy);
            return; 
        }
        
        const coords = updateMouseCoords(e);
        lastX = coords.clientX; lastY = coords.clientY;
        pointerDownX = coords.clientX; pointerDownY = coords.clientY;
    }

    function onPointerMove(e) {
        if (document.getElementById('homepage-container').classList.contains('hidden') && e.target.tagName === 'CANVAS') {
            if(e.cancelable) e.preventDefault(); 
        }
        
        const coords = updateMouseCoords(e);

        if (isInteracting && e.touches && e.touches.length >= 2) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            const touchDistance = Math.sqrt(dx * dx + dy * dy);
            
            if (startTouchDistance > 0) {
                const factor = touchDistance / startTouchDistance;
                targetDistance = targetDistance / factor;
                targetDistance = Math.max(minDistance, Math.min(maxDistance, targetDistance));
                startTouchDistance = touchDistance; 
            }
            return; 
        }

        if (isInteracting && (!e.touches || e.touches.length === 1)) {
            targetTheta += (coords.clientX - lastX) * 0.008; 
            targetPhi -= (coords.clientY - lastY) * 0.008;
            targetPhi = Math.max(0.1, Math.min(Math.PI / 2 - 0.05, targetPhi));
            lastX = coords.clientX; lastY = coords.clientY;
        }

        if (e.type === 'mousemove') {
            raycaster.setFromCamera(mouse, camera);
            const checkHitTargets = [];
            markers.forEach(group => { checkHitTargets.push(group.children[0]); });
            const intersects = raycaster.intersectObjects(checkHitTargets, true);
            const tip = document.getElementById('cursor-tip');
            if (intersects.length > 0) {
                tip.style.display = 'block';
                tip.style.left = (coords.clientX + 15) + 'px';
                tip.style.top = (coords.clientY + 15) + 'px';
                tip.innerHTML = `🏮 点选查阅：${intersects[0].object.userData.title}`;
                document.body.style.cursor = 'pointer';
            } else {
                tip.style.display = 'none';
                document.body.style.cursor = 'default';
            }
        }
    }

    function onPointerUp(e) {
        if (!isInteracting) return;
        isInteracting = false;
        startTouchDistance = 0; 

        if (e.target.tagName !== 'CANVAS') return;
        
        let endX = (e.changedTouches && e.changedTouches.length > 0) ? e.changedTouches[0].clientX : e.clientX;
        let endY = (e.changedTouches && e.changedTouches.length > 0) ? e.changedTouches[0].clientY : e.clientY;

        if (Math.abs(endX - pointerDownX) > 8 || Math.abs(endY - pointerDownY) > 8) return;

        raycaster.setFromCamera(mouse, camera);
        const checkHitTargets = [];
        markers.forEach(group => { checkHitTargets.push(group.children[0]); });

        const intersects = raycaster.intersectObjects(checkHitTargets, true);
        if (intersects.length > 0) {
            openDetailPanel(intersects[0].object.userData, intersects[0].point); 
        }
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate(time) {
        requestAnimationFrame(animate);

        currentLookAt.lerp(targetLookAt, LERP_FACTOR);
        currentDistance += (targetDistance - currentDistance) * LERP_FACTOR;
        currentPhi += (targetPhi - currentPhi) * LERP_FACTOR;
        currentTheta += (targetTheta - currentTheta) * LERP_FACTOR;

        const x = currentDistance * Math.sin(currentPhi) * Math.cos(currentTheta);
        const y = currentDistance * Math.cos(currentPhi);
        const z = currentDistance * Math.sin(currentPhi) * Math.sin(currentTheta);

        camera.position.set(x + currentLookAt.x, y + currentLookAt.y, z + currentLookAt.z);
        camera.lookAt(currentLookAt);

        if(model) {
            markers.forEach((group, idx) => {
                group.lookAt(camera.position); 
                const scalePulse = 1 + Math.sin(time * 0.005 + idx * 0.8) * 0.12;
                group.children[1].scale.set(scalePulse, scalePulse, scalePulse); 

                const pulseCircle = group.children[2]; 
                const pulseCycle = (time * 0.004) % 1; 
                pulseCircle.scale.set(1 + pulseCycle * 1.5, 1 + pulseCycle * 1.5, 1);
                pulseCircle.material.opacity = Math.max(0, 1 - pulseCycle * 1.4); 
            });
        }

        if (routeLine && routeLine.material) {
            routeLine.material.opacity = 0.65 + Math.sin(time * 0.0035) * 0.22; 
        }

        renderer.render(scene, camera);
    }

    // 安全启动
    window.addEventListener('load', function() {
        setTimeout(init, 100);
    });
</script>
</body>
